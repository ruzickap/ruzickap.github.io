name: post_tests

on:
  # checkov:skip=CKV_GHA_7:The build output cannot be affected by user parameters other than the build entry point and the top-level source location. GitHub Actions workflow_dispatch inputs MUST be empty.
  workflow_dispatch:
    inputs:
      posts:
        type: choice
        description: Select post
        default: 2026-05-26-openwebui-eks-bedrock-opentofu
        options:
          - 2026-01-13-amazon-eks-grafana-stack
          - 2026-01-26-bootstrap-eks-auto-mode-bootstrap-ack-kro-velero
          - 2026-03-04-amazon-eks-envoy-gateway-argocd
          - 2026-05-26-openwebui-eks-bedrock-opentofu
          - 2026-06-11-bedrock-agentcore-slack-opentofu
          - 2026-06-17-slack-bot-bedrock-confluence|2026-05-26-openwebui-eks-bedrock-opentofu
      action:
        type: choice
        description: Select action
        default: create
        options:
          - create
          - delete
      cluster_fqdn:
        type: string
        description: Cluster FQDN
        default: k01.k8s.mylabs.dev

env:
  AWS_REGION: us-east-1
  CLUSTER_FQDN: ${{ inputs.cluster_fqdn }}
  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
  GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
  MY_SLACK_APP_TOKEN: ${{ secrets.MY_SLACK_APP_TOKEN }}
  MY_SLACK_BOT_SIGNING_SECRET: ${{ secrets.MY_SLACK_BOT_SIGNING_SECRET }}
  MY_SLACK_BOT_TOKEN: ${{ secrets.MY_SLACK_BOT_TOKEN }}
  MY_CONFLUENCE_API_TOKEN: ${{ secrets.MY_CONFLUENCE_API_TOKEN }}

permissions: read-all

jobs:
  post-pipeline:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    name: "${{ inputs.action }} | ${{ inputs.posts }}"
    concurrency:
      group: post_tests-${{ inputs.cluster_fqdn }}
    timeout-minutes: 240 # Same as timeout for the AWS IAM role - AWS_ROLE_TO_ASSUME
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.RUZICKA_SBX01_AWS_ROLE_TO_ASSUME }}
          role-duration-seconds: 14400
          role-session-name: ${{ github.event.repository.name }}-${{ github.workflow }}-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Check out repository code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Remove fnox.toml to skip fnox-env secret resolution in CI
        run: rm -f fnox.toml

      - name: Install mise and dependencies
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # renovate: datasource=github-releases depName=jdx/mise
          version: 2026.6.14

      - name: "${{ inputs.action }} | ${{ inputs.posts }}"
        env:
          ACTION: ${{ inputs.action }}
          POSTS: ${{ inputs.posts }}
        run: |
          set -euxo pipefail
          mise run "${ACTION}:${POSTS}"
