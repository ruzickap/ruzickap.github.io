# mise.toml - Tool and task management configuration
# This file manages tool versions, environment variables, and automated tasks for blog post testing

##############################################################################
# Tool Versions
##############################################################################
[tools]
# keep-sorted start
"github:aws-cloudformation/rain" = "1.24.4"
"github:cilium/cilium-cli" = "0.19.4"
aws = { version = "2.35.2", symlink_bins = "true" }
aws-copilot = "1.34.1"
eksctl = "0.227.0"
fnox = "1.25.1"
helm = "4.2.0"
kind = "0.32.0"
kubectl = "1.36.1"
opentofu = "1.12.1"
velero = "1.18.1"
yq = "4.53.3"
# keep-sorted end

[tools."github:harehare/mq"]
version = "0.6.0"
bin = "mq"

[tools."github:harehare/mq".platforms]
linux-x64 = { asset_pattern = "mq-x86_64-unknown-linux-gnu" }
linux-arm64 = { asset_pattern = "mq-aarch64-unknown-linux-gnu" }
macos-arm64 = { asset_pattern = "mq-aarch64-apple-darwin" }

##############################################################################
# Plugins
##############################################################################
[plugins]
fnox-env = "https://github.com/jdx/mise-env-fnox"

##############################################################################
# Global Settings
[settings]
jobs = 1
trusted_config_paths = ["/"]

##############################################################################
# Environment Variables
[env]
_.fnox-env = { tools = true }
FORCE_COLOR = 1

##############################################################################
# Tasks - Blog Post Testing
# Each task follows the pattern:
# - create:posts:* - Creates and tests blog post environments
# - delete:posts:* - Cleans up blog post test environments
##############################################################################

#------------------------------------------------------------------------------
# EKS Access
#------------------------------------------------------------------------------
[tasks."eks-access"]
description = 'EKS Access - eval "$(mise run a)"'
alias = "a"
quiet = true
env.EKS_POST_FILE = "./_posts/2026/2026-05-26-openwebui-eks-bedrock-opentofu.md"
run = '''
cat <<EOF
$(mq -A 'filter(fn(n): n | .code.lang == "bash";) | first()' "${EKS_POST_FILE}")

export KUBECONFIG="/tmp/kubeconfig-\${CLUSTER_NAME}-\$\$.conf"
aws eks update-kubeconfig --name "\${CLUSTER_NAME}" --kubeconfig "\${KUBECONFIG}"
EOF
'''

