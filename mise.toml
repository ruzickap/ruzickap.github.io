#------------------------------------------------------------------------------
# Create and delete all posts
#------------------------------------------------------------------------------
[tasks."create-delete:posts:all"]
description = 'Create and delete all posts'
run = '''
  #!/usr/bin/env bash
  set -euxo pipefail
  while read -r TASK; do
    mise run "${TASK}"
  done < <(sed -n 's/^\[tasks."\(\(create\|delete\):.*\)"]/\1/p' mise.toml)
'''
